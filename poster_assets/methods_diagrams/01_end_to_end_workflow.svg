<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
<rect width="100%" height="100%" fill="#FFFFFF"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6"
            orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#596B7A"/>
    </marker>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        dominant-baseline: alphabetic;
      }
    </style>
  </defs>

<text x="70.0" y="70.0" font-size="36" font-weight="800" fill="#1F2933" text-anchor="start">End-to-End Study Workflow</text>
<text x="70.0" y="107.0" font-size="18" fill="#596B7A" text-anchor="start">MIMIC-IV admissions, ECG machine measurements, and discharge notes feed two linked workflows: early-</text>
<text x="70.0" y="129.0" font-size="18" fill="#596B7A" text-anchor="start">window tabular prediction and LLM-assisted phenotype refinement.</text>
<rect x="70.0" y="190.0" width="315.0" height="105.0" rx="8" ry="8" fill="#EEF6F5" stroke="#2C7A7B" stroke-width="2"/>
<text x="92.0" y="226.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">Hospital tables</text>
<text x="92.0" y="258.0" font-size="18" fill="#596B7A" text-anchor="start">admissions, patients,</text>
<text x="92.0" y="280.0" font-size="18" fill="#596B7A" text-anchor="start">diagnoses_icd</text>
<rect x="70.0" y="340.0" width="315.0" height="105.0" rx="8" ry="8" fill="#EEF6F5" stroke="#2C7A7B" stroke-width="2"/>
<text x="92.0" y="376.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">ECG table</text>
<text x="92.0" y="408.0" font-size="18" fill="#596B7A" text-anchor="start">machine_measurements with ECG</text>
<text x="92.0" y="430.0" font-size="18" fill="#596B7A" text-anchor="start">timestamps</text>
<rect x="70.0" y="490.0" width="315.0" height="105.0" rx="8" ry="8" fill="#EEF6F5" stroke="#2C7A7B" stroke-width="2"/>
<text x="92.0" y="526.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">Note tables</text>
<text x="92.0" y="558.0" font-size="18" fill="#596B7A" text-anchor="start">discharge notes; radiology</text>
<text x="92.0" y="580.0" font-size="18" fill="#596B7A" text-anchor="start">optional for censoring</text>
<rect x="500.0" y="185.0" width="360.0" height="150.0" rx="8" ry="8" fill="#F3F6FA" stroke="#3D5A80" stroke-width="2"/>
<text x="522.0" y="221.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">Cohort spine</text>
<text x="522.0" y="253.0" font-size="18" fill="#596B7A" text-anchor="start">Adult admissions; exact ICD targets;</text>
<text x="522.0" y="275.0" font-size="18" fill="#596B7A" text-anchor="start">index time from valid ED</text>
<text x="522.0" y="297.0" font-size="18" fill="#596B7A" text-anchor="start">registration, otherwise admission</text>
<text x="522.0" y="319.0" font-size="18" fill="#596B7A" text-anchor="start">time.</text>
<rect x="500.0" y="375.0" width="360.0" height="135.0" rx="8" ry="8" fill="#F3F6FA" stroke="#3D5A80" stroke-width="2"/>
<text x="522.0" y="411.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">24-hour feature window</text>
<text x="522.0" y="443.0" font-size="18" fill="#596B7A" text-anchor="start">Window starts at index time. Active</text>
<text x="522.0" y="465.0" font-size="18" fill="#596B7A" text-anchor="start">default keeps demographics and first</text>
<text x="522.0" y="487.0" font-size="18" fill="#596B7A" text-anchor="start">in-window ECG machine measurements.</text>
<rect x="500.0" y="565.0" width="360.0" height="150.0" rx="8" ry="8" fill="#F8F4FF" stroke="#6B4E9B" stroke-width="2"/>
<text x="522.0" y="601.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">Discharge-note parser</text>
<text x="522.0" y="633.0" font-size="18" fill="#596B7A" text-anchor="start">Admissions with in-window ECG and</text>
<text x="522.0" y="655.0" font-size="18" fill="#596B7A" text-anchor="start">non-empty discharge notes are parsed</text>
<text x="522.0" y="677.0" font-size="18" fill="#596B7A" text-anchor="start">with a strict phenotype schema.</text>
<rect x="980.0" y="250.0" width="330.0" height="145.0" rx="8" ry="8" fill="#FFF6E6" stroke="#B36B00" stroke-width="2"/>
<text x="1002.0" y="286.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">ECG-complete model</text>
<text x="1002.0" y="318.0" font-size="18" fill="#596B7A" text-anchor="start">XGBoost with native categorical</text>
<text x="1002.0" y="340.0" font-size="18" fill="#596B7A" text-anchor="start">handling; class imbalance handled</text>
<text x="1002.0" y="362.0" font-size="18" fill="#596B7A" text-anchor="start">by scale_pos_weight.</text>
<rect x="980.0" y="485.0" width="330.0" height="145.0" rx="8" ry="8" fill="#EEF8EE" stroke="#3A7D44" stroke-width="2"/>
<text x="1002.0" y="521.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">LLM-derived cohorts</text>
<text x="1002.0" y="553.0" font-size="18" fill="#596B7A" text-anchor="start">Target cleanup and control</text>
<text x="1002.0" y="575.0" font-size="18" fill="#596B7A" text-anchor="start">characterization can define</text>
<text x="1002.0" y="597.0" font-size="18" fill="#596B7A" text-anchor="start">encounter-level cohorts for model</text>
<text x="1002.0" y="619.0" font-size="18" fill="#596B7A" text-anchor="start">variants.</text>
<rect x="1350.0" y="300.0" width="180.0" height="260.0" rx="8" ry="8" fill="#F7F9FC" stroke="#B7C3CF" stroke-width="2"/>
<text x="1372.0" y="336.0" font-size="23" font-weight="700" fill="#1F2933" text-anchor="start">Outputs</text>
<text x="1372.0" y="368.0" font-size="17" fill="#596B7A" text-anchor="start">HTML report</text>
<text x="1372.0" y="389.0" font-size="17" fill="#596B7A" text-anchor="start">PR/ROC curves</text>
<text x="1372.0" y="410.0" font-size="17" fill="#596B7A" text-anchor="start">threshold table</text>
<text x="1372.0" y="431.0" font-size="17" fill="#596B7A" text-anchor="start">SHAP summaries</text>
<text x="1372.0" y="452.0" font-size="17" fill="#596B7A" text-anchor="start">run metadata</text>
<text x="1372.0" y="473.0" font-size="17" fill="#596B7A" text-anchor="start">JSONL/CSV parse</text>
<text x="1372.0" y="494.0" font-size="17" fill="#596B7A" text-anchor="start">files</text>
<line x1="385.0" y1="242.0" x2="500.0" y2="242.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="385.0" y1="392.0" x2="500.0" y2="443.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="385.0" y1="542.0" x2="500.0" y2="633.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="680.0" y1="320.0" x2="680.0" y2="375.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="860.0" y1="443.0" x2="980.0" y2="322.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="860.0" y1="633.0" x2="980.0" y2="558.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1310.0" y1="322.0" x2="1350.0" y2="395.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1310.0" y1="558.0" x2="1350.0" y2="465.0" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M860,443 C910,443 925,558 980,558" fill="none" stroke="#596B7A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
</svg>
